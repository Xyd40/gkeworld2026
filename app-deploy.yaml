apiVersion: apps/v1
kind: Deployment
metadata:
  name: real-app-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-real-app
  template:
    metadata:
      labels:
        app: my-real-app
    spec:
      containers:
      - name: web-container
        image: us-central1-docker.pkg.dev/gkeworld2026/devops-lab/my-app:v1
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: real-app-service
spec:
  type: LoadBalancer
  selector:
    app: my-real-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
